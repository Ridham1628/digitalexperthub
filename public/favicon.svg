<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background square with rounded corners -->
  <rect width="64" height="64" rx="13" fill="#0b0f0c"/>

  <!-- D outline stroke -->
  <path d="M 9,5 L 9,59 L 25,59 A 28,27 0 0 0 25,5 Z"
    stroke="#c8f250" stroke-width="7"
    stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Row 1: 1 pad + bar -->
  <rect x="17" y="17" width="9" height="9" rx="2" fill="#c8f250"/>
  <rect x="28" y="19.5" width="16" height="4" rx="1.5" fill="#c8f250"/>

  <!-- Row 2: 2 pads + bar -->
  <rect x="17" y="28" width="9" height="9" rx="2" fill="#c8f250"/>
  <rect x="28" y="28" width="9" height="9" rx="2" fill="#c8f250"/>
  <rect x="39" y="30.5" width="11" height="4" rx="1.5" fill="#c8f250"/>

  <!-- Row 3: 3 pads -->
  <rect x="17" y="39" width="9" height="9" rx="2" fill="#c8f250"/>
  <rect x="28" y="39" width="9" height="9" rx="2" fill="#c8f250"/>
  <rect x="39" y="39" width="9" height="9" rx="2" fill="#c8f250"/>
</svg>
